<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 다운로드</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b1020, #11182d);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #cfd4e6;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .game-image {
      width: 100%;
      max-width: 700px;
      border-radius: 20px;
      margin: 20px 0 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .download-btn {
      display: inline-block;
      background: #7c5cff;
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      padding: 16px 34px;
      border-radius: 14px;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .download-btn:hover {
      background: #6948ff;
      transform: translateY(-2px);
    }

    .section {
      margin-top: 45px;
      background: rgba(255,255,255,0.06);
      padding: 28px;
      border-radius: 18px;
      text-align: left;
    }

    .section h2 {
      margin-top: 0;
      font-size: 28px;
    }

    .section p {
      color: #d5d9e8;
      line-height: 1.7;
      font-size: 17px;
    }

    .footer {
      margin-top: 35px;
      font-size: 14px;
      color: #9ea7c7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Rhythm Graph</h1>
    <p class="subtitle">
      Rhythm Graph 게임 다운로드 페이지에 온 것을 환영합니다.<br>
      아래 버튼을 눌러 게임을 다운로드하세요.
    </p>

    <a class="download-btn" href="#">다운로드</a>

    <div class="section">
      <h2>게임 소개</h2>
      <p>
        이 게임은 타이밍에 맞춰 노트를 누르는 리듬 게임입니다.
        정확한 판정으로 높은 점수를 노려 보세요.
      </p>
    </div>

    <div class="section">
      <h2>플레이 방법</h2>
      <p>
        화면에 다가오는 노트를 알맞은 순간에 눌러 점수를 얻습니다.
        미스 없이 콤보를 이어가며 최고 기록에 도전해 보세요.
      </p>
    </div>

    <p class="footer">Made with GitHub Pages</p>
  </div>
</body>
</html>
